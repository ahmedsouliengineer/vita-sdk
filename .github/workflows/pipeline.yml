name: Vita SDK CI (Library Validation)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: read

jobs:
  # JOB 1: Validating the Code Logic
  unit-testing:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ahmedsouliengineer/vita-base:v1.0.1
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    steps:
    - name: "0. Checkout Code"
      uses: actions/checkout@v4

    - name: "1. Static Analysis (Cppcheck)"
      run: |
        cppcheck --enable=all -I include \
          --suppress=unusedFunction \
          --suppress=missingIncludeSystem \
          src/ include/ --error-exitcode=1

    - name: "2. Compilation & Unit Testing"
      run: |
        cmake -B build \
          -DCMAKE_TOOLCHAIN_FILE=/opt/vcpkg/scripts/buildsystems/vcpkg.cmake \
          -DCMAKE_PREFIX_PATH=/opt/vcpkg/installed/x64-linux \
          -DCMAKE_CXX_COMPILER=clang++ \
          -DENABLE_COVERAGE=ON \
          -DBUILD_TESTING=ON
        cmake --build build --parallel $(nproc)
        cd build && ctest --output-on-failure

    - name: "3. Coverage Analysis"
      run: |
        cd build
        llvm-profdata merge -sparse default.profraw -o test.profdata
        llvm-cov report ./unit_tests -instr-profile=test.profdata ../src/

  # JOB 2: Validating the SDK Distribution
  package-verification:
    runs-on: ubuntu-latest
    needs: unit-testing
    
    steps:
    - name: "0. Checkout Code"
      uses: actions/checkout@v4

    - name: "1. Log in to GHCR"
      # I am choosing to use the built-in docker login command on the host
      run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    - name: "2. Build Multi-Stage Release"
      # Now the pull from ghcr.io will be authorized!
      run: |
        docker build --target release -t vita-sdk-dist -f .devcontainer/Dockerfile .