name: Vita SDK CI (Library Validation)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    # I am choosing to run the entire job INSIDE your pre-built image
    container:
      image: ghcr.io/ahmedsouliengineer/vita-base:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
    - name: "0. Checkout Code"
      uses: actions/checkout@v4

    # I am choosing to skip the 'sudo apt install' step because your base image 
    # already has Clang 18, CMake, and the OTel dependencies.

    - name: "1. Static Analysis (Cppcheck)"
      run: cppcheck --enable=all -I include --suppress=unusedFunction --suppress=missingIncludeSystem src/ include/ --error-exitcode=1

    - name: "2. Compilation & Unit Testing"
      # I am choosing to pass the toolchain file so it finds the OTel/GTest in /opt/vcpkg
      run: |
        cmake -B build \
          -DCMAKE_TOOLCHAIN_FILE=/opt/vcpkg/scripts/buildsystems/vcpkg.cmake \
          -DCMAKE_PREFIX_PATH=/opt/vcpkg/installed/x64-linux \
          -DCMAKE_CXX_COMPILER=clang++ \
          -DENABLE_COVERAGE=ON \
          -DBUILD_TESTING=ON
        cmake --build build --parallel $(nproc)
        cd build && ctest --output-on-failure

    - name: "3. Coverage Analysis"
      run: |
        cd build
        # I am choosing to use the LLVM tools already symlinked in your base image
        llvm-profdata merge -sparse default.profraw -o test.profdata
        llvm-cov report ./unit_tests -instr-profile=test.profdata ../src/

    - name: "4. SDK Packaging Verification"
      # This step still runs on the host Docker daemon to verify the Dockerfile stages
      run: |
        docker build --target release -t vita-sdk-dist -f .devcontainer/Dockerfile .